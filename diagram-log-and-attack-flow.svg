<svg viewBox="0 0 1300 420" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#15803d"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1300" height="420" fill="#ffffff"/>
  <text x="40" y="28" font-size="19" font-weight="bold" fill="#0f172a">Log &amp; Attack Investigation Flow</text>
  <text x="40" y="47" font-size="12" fill="#64748b">How traffic became a log, and how the log became a finding</text>

  <!-- Stage labels -->
  <text x="160" y="78" font-size="12" font-weight="bold" fill="#64748b" text-anchor="middle">1. SOURCES</text>
  <text x="555" y="78" font-size="12" font-weight="bold" fill="#64748b" text-anchor="middle">2. COLLECTION</text>
  <text x="880" y="78" font-size="12" font-weight="bold" fill="#64748b" text-anchor="middle">3. ANALYSIS</text>
  <text x="1190" y="78" font-size="12" font-weight="bold" fill="#64748b" text-anchor="middle">4. FINDING</text>

  <!-- Attack note -->
  <rect x="40" y="92" width="240" height="44" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="160" y="110" font-size="11" font-weight="bold" fill="#b91c1c" text-anchor="middle">LINUX-ISP runs Nikto →</text>
  <text x="160" y="126" font-size="11" font-weight="bold" fill="#b91c1c" text-anchor="middle">attacks Target Web Server</text>
  <line x1="160" y1="136" x2="160" y2="158" stroke="#b91c1c" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- Source boxes -->
  <rect x="40" y="160" width="240" height="60" rx="8" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
  <text x="160" y="183" font-size="13" font-weight="bold" fill="#15803d" text-anchor="middle">HQ-NGFW-1</text>
  <text x="160" y="200" font-size="11" fill="#475569" text-anchor="middle">live traffic + IPS logs</text>

  <rect x="40" y="235" width="240" height="60" rx="8" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
  <text x="160" y="258" font-size="13" font-weight="bold" fill="#15803d" text-anchor="middle">HQ-ISFW</text>
  <text x="160" y="275" font-size="11" fill="#475569" text-anchor="middle">live traffic logs</text>

  <rect x="40" y="310" width="240" height="60" rx="8" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
  <text x="160" y="333" font-size="13" font-weight="bold" fill="#15803d" text-anchor="middle">BR1-FGT-1</text>
  <text x="160" y="350" font-size="11" fill="#475569" text-anchor="middle">historical file import</text>

  <!-- arrows to FortiAnalyzer -->
  <line x1="280" y1="190" x2="430" y2="210" stroke="#1d4ed8" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <line x1="280" y1="265" x2="430" y2="225" stroke="#1d4ed8" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <line x1="280" y1="340" x2="430" y2="245" stroke="#1d4ed8" stroke-width="2.2" stroke-dasharray="6,4" marker-end="url(#arrowBlue)"/>

  <!-- FortiAnalyzer -->
  <rect x="440" y="170" width="230" height="100" rx="10" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="555" y="208" font-size="14" font-weight="bold" fill="#1d4ed8" text-anchor="middle">FortiAnalyzer</text>
  <text x="555" y="226" font-size="11" fill="#475569" text-anchor="middle">Centralized logging</text>
  <text x="555" y="244" font-size="11" fill="#475569" text-anchor="middle">ADOM1 · 10.0.13.125</text>
  <ellipse cx="555" cy="256" rx="20" ry="5" fill="none" stroke="#1d4ed8" stroke-width="1.3"/>
  <ellipse cx="555" cy="261" rx="20" ry="5" fill="none" stroke="#1d4ed8" stroke-width="1.3"/>

  <!-- arrows to analysis -->
  <line x1="670" y1="205" x2="760" y2="185" stroke="#1d4ed8" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <line x1="670" y1="240" x2="760" y2="290" stroke="#1d4ed8" stroke-width="2.2" marker-end="url(#arrowBlue)"/>

  <!-- Analysis boxes -->
  <rect x="765" y="140" width="230" height="90" rx="10" fill="#fffbeb" stroke="#b45309" stroke-width="2"/>
  <text x="880" y="170" font-size="13" font-weight="bold" fill="#b45309" text-anchor="middle">Log View</text>
  <text x="880" y="188" font-size="11" fill="#475569" text-anchor="middle">raw record inspection</text>
  <text x="880" y="204" font-size="11" fill="#475569" text-anchor="middle">filters + Custom View</text>

  <rect x="765" y="250" width="230" height="90" rx="10" fill="#fffbeb" stroke="#b45309" stroke-width="2"/>
  <text x="880" y="280" font-size="13" font-weight="bold" fill="#b45309" text-anchor="middle">FortiView</text>
  <text x="880" y="298" font-size="11" fill="#475569" text-anchor="middle">aggregated threat hunting</text>
  <text x="880" y="314" font-size="11" fill="#475569" text-anchor="middle">Top Threats · Traffic Analysis</text>

  <!-- arrows to findings -->
  <line x1="995" y1="185" x2="1075" y2="185" stroke="#b45309" stroke-width="2.2" marker-end="url(#arrowGreen)"/>
  <line x1="995" y1="295" x2="1075" y2="295" stroke="#b45309" stroke-width="2.2" marker-end="url(#arrowGreen)"/>

  <!-- Finding boxes -->
  <rect x="1080" y="140" width="200" height="90" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="1180" y="165" font-size="12" font-weight="bold" fill="#0f172a" text-anchor="middle">Finding</text>
  <text x="1180" y="184" font-size="10.5" fill="#475569" text-anchor="middle">Policy ID 1 allowed</text>
  <text x="1180" y="200" font-size="10.5" fill="#475569" text-anchor="middle">P2P / BitTorrent traffic</text>

  <rect x="1080" y="250" width="200" height="90" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="1180" y="275" font-size="12" font-weight="bold" fill="#0f172a" text-anchor="middle">Finding</text>
  <text x="1180" y="294" font-size="10.5" fill="#475569" text-anchor="middle">Nikto attack traced to</text>
  <text x="1180" y="310" font-size="10.5" fill="#475569" text-anchor="middle">source IP + signature</text>

  <!-- legend -->
  <line x1="40" y1="392" x2="75" y2="392" stroke="#1d4ed8" stroke-width="2.2"/>
  <text x="83" y="396" font-size="10.5" fill="#1f2d3d">Live log forwarding</text>
  <line x1="240" y1="392" x2="275" y2="392" stroke="#1d4ed8" stroke-width="2.2" stroke-dasharray="6,4"/>
  <text x="283" y="396" font-size="10.5" fill="#1f2d3d">Historical file import</text>
  <line x1="460" y1="392" x2="495" y2="392" stroke="#b91c1c" stroke-width="2.2"/>
  <text x="503" y="396" font-size="10.5" fill="#1f2d3d">Attack traffic</text>
</svg>
